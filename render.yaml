services:
  - type: web
    name: jyotisha-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AYANAMSHA
        value: lahiri
    healthCheckPath: /health
